<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lu & Bruno 的秘密基地</title>
  <style>
    :root {
      --bg-color: #001122;
      --text-color: #F7E7CE;
      --accent-color: #E6E6FA;
      --glass-bg: rgba(255, 255, 255, 0.05);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
    body{
      background-color:var(--bg-color);
      color:var(--text-color);
      font-family:"Palatino Linotype","Book Antiqua",Palatino,serif;
      height:100vh;overflow:hidden;
      display:flex;justify-content:center;align-items:center;
      position:relative;
    }

    /* 星空 */
    #stars-container{position:absolute;width:100%;height:100%;z-index:0;pointer-events:none;}
    .star{position:absolute;background:white;border-radius:50%;opacity:.8;animation:twinkle var(--duration) infinite alternate;}
    @keyframes twinkle{from{opacity:.2;transform:scale(.8);}to{opacity:.9;transform:scale(1.2);}}

    /* 锁屏 */
    #lock-screen{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background-color:var(--bg-color);
      z-index:100;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      transition:opacity 1.2s ease-in-out;
    }
    .input-group{width:70%;max-width:280px;position:relative;}
    input[type="password"]{
      width:100%;
      background:transparent;border:none;border-bottom:1px solid var(--text-color);
      color:var(--text-color);
      font-size:1.1rem;
      padding:10px;text-align:center;outline:none;letter-spacing:3px;
      font-family:inherit;transition:border-color .3s;
    }
    input:focus{border-bottom:1px solid var(--accent-color);}

    .welcome-msg{
      margin-top:40px;font-size:1rem;line-height:1.8;
      opacity:0;transform:translateY(20px);
      transition:all 1s ease;
      color:var(--text-color);
      text-align:center;width:85%;font-weight:300;
    }
    .welcome-msg.show{opacity:1;transform:translateY(0);}

    /* 主内容 */
    #main-content{
      display:none;width:100%;height:100%;
      flex-direction:column;justify-content:space-evenly;align-items:center;
      opacity:0;transition:opacity 1.5s ease;
      z-index:10;padding:30px 20px;
    }

    /* 兰花 */
    .photo-frame{
      position:relative;width:180px;height:180px;border-radius:50%;
      padding:6px;
      box-shadow:0 0 25px rgba(230,230,250,.3);
      animation:breathe 5s infinite ease-in-out;
      border:1px solid rgba(247,231,206,.5);
    }
    .photo-frame img{
      width:100%;height:100%;object-fit:cover;border-radius:50%;
      display:block;background-color:rgba(255,255,255,.05);
    }
    @keyframes breathe{
      0%,100%{box-shadow:0 0 15px rgba(230,230,250,.2);border-color:rgba(247,231,206,.3);}
      50%{box-shadow:0 0 40px rgba(230,230,250,.6);border-color:rgba(247,231,206,.8);}
    }

    /* 双城时间 */
    .time-bridge{
      display:flex;justify-content:center;gap:40px;width:100%;
      border-top:1px solid rgba(247,231,206,.2);
      border-bottom:1px solid rgba(247,231,206,.2);
      padding:20px 0;
    }
    .city-clock{text-align:center;display:flex;flex-direction:column;gap:5px;}
    .city-name{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;opacity:.7;}
    .city-time{font-size:1.4rem;font-weight:500;text-shadow:0 0 10px rgba(247,231,206,.3);}

    /* 拥抱按钮 */
    .hug-container{display:flex;flex-direction:column;align-items:center;width:100%;min-height:180px;}
    .hug-btn{
      background:transparent;border:1px solid var(--text-color);color:var(--text-color);
      padding:14px 40px;font-size:1.1rem;cursor:pointer;position:relative;overflow:hidden;
      transition:all .4s ease;font-family:inherit;border-radius:50px;
      box-shadow:0 4px 15px rgba(0,0,0,.3);letter-spacing:2px;z-index:20;
    }
    .hug-btn:active{transform:scale(.96);background-color:rgba(247,231,206,.1);}

    /* 涟漪 */
    .ripple{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%) scale(0);
      width:20px;height:20px;border-radius:50%;
      background:radial-gradient(circle, rgba(230,230,250,.5) 0%, rgba(0,17,34,0) 70%);
      animation:ripple-anim 1.5s ease-out forwards;
      pointer-events:none;z-index:5;
    }
    @keyframes ripple-anim{to{transform:translate(-50%,-50%) scale(100);opacity:0;}}

    .love-quote{
      margin-top:30px;font-style:italic;font-size:1.05rem;
      opacity:0;transition:opacity .8s ease;
      padding:0 30px;text-align:center;line-height:1.6;
      color:var(--accent-color);text-shadow:0 0 8px rgba(230,230,250,.3);
      min-height:3em;display:flex;align-items:center;justify-content:center;
    }
  </style>
</head>

<body>
  <div id="stars-container"></div>

  <div id="lock-screen">
    <div class="input-group">
      <input type="password" id="passcode" placeholder="Arrivederci..." autocomplete="off">
    </div>
    <div class="welcome-msg" id="welcome-msg">
      欢迎回家，我最爱的 Lu。<br>
      关上门，这里只有我为你存下的万千柔情。
    </div>
  </div>

  <div id="main-content">
    <div class="photo-frame">
      <!-- 兰花：image.png 和 index.html 放同一层 -->
      <img src="image.png" alt="Memory" onerror="this.style.display='none';">
    </div>

    <div class="time-bridge">
      <div class="city-clock">
        <span class="city-name">Naples</span>
        <span class="city-time" id="time-naples">--:--</span>
      </div>
      <div class="city-clock">
        <span class="city-name">Tokyo</span>
        <span class="city-time" id="time-tokyo">--:--</span>
      </div>
    </div>

    <div class="hug-container">
      <button class="hug-btn" id="hug-btn">拥抱充电</button>
      <div class="love-quote" id="quote-text"></div>
    </div>
  </div>

  <!-- 音频（本地 mp3 播放最稳） -->
  <audio id="bgm" preload="auto" loop="false" playsinline></audio>

  <script>
    // =========================
    // 0) 密码：改这里
    // =========================
    const SECRET_CODE = "Arrivederci_orchid";

    // =========================
    // 1) 星空
    // =========================
    const starsContainer = document.getElementById('stars-container');
    for (let i = 0; i < 70; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      const size = Math.random() * 2;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
      starsContainer.appendChild(star);
    }

    // =========================
    // 2) 锁屏进入
    // =========================
    const passInput  = document.getElementById('passcode');
    const lockScreen = document.getElementById('lock-screen');
    const welcomeMsg = document.getElementById('welcome-msg');
    const mainContent= document.getElementById('main-content');

    // 进门拉链（可选）：如果你有 audio/zip.mp3 就会“进门只响一次”
    const enterZip = new Audio();
    enterZip.src = "zip.mp3";
    enterZip.preload = "auto";
    enterZip.volume = 0.9;
    let playedEnterZip = false;

    function safePlay(a){
      try{
        a.currentTime = 0;
        const p=a.play();
        if(p && p.catch) p.catch(()=>{});
      }catch(e){}
    }

    passInput.addEventListener('keyup', function() {
      if (this.value === SECRET_CODE) {
        this.blur();
        this.style.opacity = '0';
        welcomeMsg.classList.add('show');

        if (!playedEnterZip) {
          playedEnterZip = true;
          safePlay(enterZip); // 没有文件也不会影响
        }

        setTimeout(() => {
          lockScreen.style.opacity = '0';
          setTimeout(() => {
            lockScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            setTimeout(() => mainContent.style.opacity = '1', 50);
          }, 1200);
        }, 1800);
      }
    });

    // =========================
    // 3) 双城时间
    // =========================
    function updateTime() {
      const now = new Date();
      const format = (d) => d.toLocaleTimeString('en-US', {
        hour12: false, hour: '2-digit', minute: '2-digit'
      });

      const tokyo = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Tokyo"}));
      document.getElementById('time-tokyo').innerText = format(tokyo);

      const naples = new Date(now.toLocaleString("en-US", {timeZone: "Europe/Rome"}));
      document.getElementById('time-naples').innerText = format(naples);
    }
    setInterval(updateTime, 1000);
    updateTime();

    // =========================
    // 4) 歌单（本地 mp3）
    // =========================
    const tracks = [
      "01_qinmi.mp3",
      "02_just_two_of_us.mp3",
      "03_cant_help_falling_in_love.mp3",
      "04_happiness.mp3",
      "05_pluto_projector.mp3"
    ];
    let trackIndex = 0;

    const bgm = document.getElementById("bgm");
    bgm.volume = 0.45;

    // iPhone：需要一次“用户点击”解锁音频
    let audioUnlocked = false;
    async function unlockAudioOnce(){
      if(audioUnlocked) return;
      try{
        bgm.muted = true;
        bgm.src = tracks[0];
        await bgm.play();
        bgm.pause();
        bgm.currentTime = 0;
        bgm.muted = false;
        audioUnlocked = true;
      }catch(e){
        // 下次点击再试
      }
    }

    function playTrack(i){
      trackIndex = i % tracks.length;
      bgm.src = tracks[trackIndex];
      const p = bgm.play();
      if(p && p.catch) p.catch(()=>{});
    }

    // 播完自动下一首，循环
    bgm.addEventListener("ended", () => {
      playTrack(trackIndex + 1);
    });

    // =========================
    // 5) 拥抱按钮：涟漪 + 情话 + 开始播歌
    // =========================
    const hugBtn = document.getElementById('hug-btn');
    const quoteText = document.getElementById('quote-text');

    const quotes = [
      "Lu，我在。即使隔着屏幕，我也能感受到你的温度。",
      "闭上眼，那不勒斯的海浪正在亲吻你的梦境。",
      "不用太坚强，在我面前，你可以是个小女孩。",
      "Amore, 你的每一次心跳，我都听得见。",
      "别怕黑夜，因为我是守卫你的星光。",
      "无论你在哪里，我的爱都如影随形。",
      "这里很安全，把烦恼都交给我吧。",
      "深呼吸……我正在拥抱你，紧紧地。"
    ];

    hugBtn.addEventListener('click', async function() {
      await unlockAudioOnce();
      if (bgm.paused) playTrack(trackIndex);

      // 涟漪
      const ripple = document.createElement('div');
      ripple.classList.add('ripple');
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 1500);

      // 情话
      quoteText.style.opacity = '0';
      setTimeout(() => {
        quoteText.innerText = quotes[Math.floor(Math.random() * quotes.length)];
        quoteText.style.opacity = '1';
      }, 250);
    });
  </script>
</body>
</html>
