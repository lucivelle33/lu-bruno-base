<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>咪咪酱的肠胃地图🗺️</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdf6ef;
      --paper: #fffcf8;
      --ink: #4a3f38;
      --muted: #a0907f;
      --line: #e8d9cc;
      --safe-bg: #edf7ed;
      --safe-border: #b8ddb8;
      --safe-text: #3d7a3d;
      --caution-bg: #fdf6e0;
      --caution-border: #e8d080;
      --caution-text: #8a6d10;
      --danger-bg: #fdf0ee;
      --danger-border: #f0b8b0;
      --danger-text: #b04030;
      --accent: #e87060;
      --shadow-soft: 0 4px 20px rgba(120, 90, 70, 0.10);
      --shadow-card: 0 2px 12px rgba(120, 90, 70, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(255, 220, 180, 0.25) 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(200, 230, 200, 0.20) 0%, transparent 45%);
      color: var(--ink);
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(253, 246, 239, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 14px 20px 12px;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Ma Shan Zheng', serif;
      font-size: clamp(26px, 5vw, 36px);
      color: var(--ink);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-size: 14px;
      font-family: 'Noto Serif SC', serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: #d4b090; }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
    }

    /* ── MAIN ── */
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--muted);
      box-shadow: var(--shadow-card);
      white-space: nowrap;
    }

    .stat-chip strong {
      color: var(--ink);
      font-weight: 700;
    }

    /* ── ZONES ── */
    .zones {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .zone {
      border-radius: 20px;
      padding: 16px;
      border: 1.5px solid transparent;
      box-shadow: var(--shadow-soft);
      min-height: 200px;
    }

    .zone.safe    { background: var(--safe-bg);    border-color: var(--safe-border); }
    .zone.caution { background: var(--caution-bg); border-color: var(--caution-border); }
    .zone.danger  { background: var(--danger-bg);  border-color: var(--danger-border); }

    .zone-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px dashed rgba(0,0,0,0.08);
    }

    .zone-title {
      font-family: 'Ma Shan Zheng', serif;
      font-size: 17px;
      font-weight: 400;
    }

    .zone.safe    .zone-title { color: var(--safe-text); }
    .zone.caution .zone-title { color: var(--caution-text); }
    .zone.danger  .zone-title { color: var(--danger-text); }

    .zone-badge {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.7);
    }

    .cards { display: flex; flex-direction: column; gap: 8px; }

    /* ── FOOD CARD ── */
    .food-card {
      position: relative;
      background: rgba(255,255,255,0.82);
      border-radius: 14px;
      padding: 12px 36px 10px 12px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(255,255,255,0.9);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .food-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(120, 90, 70, 0.13);
    }

    .food-card .name {
      font-family: 'Ma Shan Zheng', serif;
      font-size: 17px;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .food-card .reaction {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.5;
    }

    .food-card .note-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.45;
      font-style: italic;
    }

    .food-card .date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      color: #c08070;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .food-card:hover .delete-btn { opacity: 1; }

    .empty {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      padding: 20px 10px;
      background: rgba(255,255,255,0.4);
      border-radius: 12px;
      border: 1px dashed var(--line);
      font-style: italic;
    }

    /* ── TABLE ── */
    .table-section {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
    }

    .table-title {
      font-family: 'Ma Shan Zheng', serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 14px;
      color: var(--ink);
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      padding: 11px 12px;
      text-align: left;
      border-bottom: 1px solid #f0e5de;
      font-size: 13px;
      vertical-align: middle;
    }

    th {
      background: #fff8f2;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(253, 246, 239, 0.6); }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag.safe    { background: var(--safe-bg);    color: var(--safe-text);    border: 1px solid var(--safe-border); }
    .tag.caution { background: var(--caution-bg); color: var(--caution-text); border: 1px solid var(--caution-border); }
    .tag.danger  { background: var(--danger-bg);  color: var(--danger-text);  border: 1px solid var(--danger-border); }

    .footer-note {
      margin-top: 12px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      font-style: italic;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(160deg, #f0907a 0%, #e06050 100%);
      color: white;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(200, 90, 70, 0.35);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      line-height: 1;
    }

    .fab:hover {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 12px 28px rgba(200, 90, 70, 0.40);
    }

    /* ── MODAL ── */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(60, 45, 38, 0.30);
      backdrop-filter: blur(4px);
      z-index: 200;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(500px, 100%);
      background: var(--paper);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 48px rgba(80, 55, 45, 0.22);
      border: 1px solid #f0e0d5;
    }

    .modal-title {
      font-family: 'Ma Shan Zheng', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 18px;
      color: var(--ink);
    }

    .form-grid { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: 'Noto Serif SC', serif;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: #d4a888; }

    .field textarea {
      resize: vertical;
      min-height: 80px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-size: 14px;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn.secondary {
      background: #f0e8e0;
      color: var(--muted);
    }

    .btn.primary {
      background: linear-gradient(160deg, #f0907a 0%, #e06050 100%);
      color: white;
      box-shadow: 0 6px 18px rgba(200, 90, 70, 0.28);
    }

    .btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(200, 90, 70, 0.35);
    }

    .btn-table-del {
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
    }

    .btn-table-edit {
      border: 1px solid var(--caution-border);
      background: var(--caution-bg);
      color: var(--caution-text);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      margin-right: 4px;
    }

    .export-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 16px;
    }

    .btn-export {
      border: 1.5px solid var(--line);
      background: var(--paper);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-export:hover {
      border-color: #d4a888;
      color: var(--ink);
    }

    .edit-card-btn {
      position: absolute;
      top: 8px;
      right: 36px;
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      color: #b09060;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .food-card:hover .edit-card-btn { opacity: 1; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .zones { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .app { padding: 16px 12px 90px; }
      .fab { right: 16px; bottom: 16px; }
      .modal-card { padding: 18px 14px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <div class="title-row">
        <h1>咪咪酱的肠胃地图🗺️</h1>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input id="searchInput" type="text" placeholder="搜索食物、反应、备注……" />
      </div>
    </div>
  </div>

  <div class="app">

    <div class="stats-row" id="statsRow">
      <div class="stat-chip">共 <strong id="totalCount">0</strong> 条记录</div>
      <div class="stat-chip">最近新增：<strong id="latestFood">—</strong></div>
      <div class="stat-chip">搜索结果：<strong id="filteredCount">0</strong> 条</div>
    </div>

    <div class="zones">
      <div class="zone safe">
        <div class="zone-head">
          <span class="zone-title">🟢 安全区</span>
          <span class="zone-badge" id="safeCount">0</span>
        </div>
        <div class="cards" id="safeCards"></div>
      </div>

      <div class="zone caution">
        <div class="zone-head">
          <span class="zone-title">⚠️ 谨慎区</span>
          <span class="zone-badge" id="cautionCount">0</span>
        </div>
        <div class="cards" id="cautionCards"></div>
      </div>

      <div class="zone danger">
        <div class="zone-head">
          <span class="zone-title">🔴 危险区</span>
          <span class="zone-badge" id="dangerCount">0</span>
        </div>
        <div class="cards" id="dangerCards"></div>
      </div>
    </div>

    <div class="export-row">
      <button class="btn-export" id="exportBtn">📦 导出备份 JSON</button>
      <button class="btn-export" id="importBtn">📂 导入备份</button>
      <input type="file" id="importFile" accept=".json" style="display:none" />
    </div>

    <div class="table-section">
      <div class="table-title">📋 全部记录</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>食物名称</th>
              <th>分类</th>
              <th>反应描述</th>
              <th>备注</th>
              <th>日期</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordTableBody"></tbody>
        </table>
      </div>
      <div class="footer-note">以后可以继续加：编辑 / 筛选 / 统计 / 导出功能 ✨</div>
    </div>

  </div>

  <button class="fab" id="openModalBtn" aria-label="添加记录">+</button>

  <div class="modal" id="recordModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-title">🍽️ 新增肠胃记录</div>
      <form id="recordForm">
        <div class="form-grid">
          <div class="field">
            <label for="foodName">食物名称</label>
            <input id="foodName" name="foodName" type="text" placeholder="例如：白粥、牛奶、西兰花……" required />
          </div>
          <div class="field">
            <label for="category">分类</label>
            <select id="category" name="category" required>
              <option value="安全">🟢 安全</option>
              <option value="谨慎">⚠️ 谨慎</option>
              <option value="危险">🔴 危险</option>
            </select>
          </div>
          <div class="field">
            <label for="reaction">反应描述</label>
            <input id="reaction" name="reaction" type="text" placeholder="例如：胃痛、太酸、胀气……" required />
          </div>
          <div class="field">
            <label for="note">备注（可选）</label>
            <textarea id="note" name="note" placeholder="例如：空腹喝的、量有点多……"></textarea>
          </div>
          <div class="field">
            <label for="date">日期</label>
            <input id="date" name="date" type="date" required />
          </div>
        </div>
        <div class="actions">
          <button type="button" class="btn secondary" id="cancelBtn">取消</button>
          <button type="submit" class="btn primary">保存 ✓</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'mimijiang_gut_map_v1';

    const $ = id => document.getElementById(id);

    function today() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const seed = [
            { id: uid(), foodName: '白粥',   category: '安全', reaction: '温和舒服，肠胃最爱',   note: '', date: today(), createdAt: Date.now()+1 },
            { id: uid(), foodName: '蜂蜜红茶', category: '安全', reaction: '暖胃甜甜的',          note: '', date: today(), createdAt: Date.now()+2 },
            { id: uid(), foodName: '牛奶',   category: '谨慎', reaction: '超过150ml会胀气',     note: '', date: today(), createdAt: Date.now()+3 },
            { id: uid(), foodName: '水果茶', category: '危险', reaction: '太酸，肠胃不舒服',     note: '以后不点了！', date: today(), createdAt: Date.now()+4 },
            { id: uid(), foodName: '洋葱',   category: '危险', reaction: '容易胀气',            note: '', date: today(), createdAt: Date.now()+5 },
            { id: uid(), foodName: '西兰花', category: '危险', reaction: '严重胀气',            note: '被记录在案了🥦', date: today(), createdAt: Date.now()+6 },
          ];
          localStorage.setItem(STORAGE_KEY, JSON.stringify(seed));
          return seed;
        }
        const p = JSON.parse(raw);
        return Array.isArray(p) ? p : [];
      } catch(e) { return []; }
    }

    function save(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function uid() { return crypto.randomUUID(); }

    function esc(str) {
      return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function catClass(c) {
      return c === '安全' ? 'safe' : c === '谨慎' ? 'caution' : 'danger';
    }

    function sorted(records) {
      return [...records].sort((a,b) => {
        const dd = new Date(b.date) - new Date(a.date);
        return dd !== 0 ? dd : (b.createdAt||0) - (a.createdAt||0);
      });
    }

    function filtered(records, q) {
      const kw = q.trim().toLowerCase();
      if (!kw) return records;
      return records.filter(r =>
        [r.foodName, r.reaction, r.note].filter(Boolean).some(t => t.toLowerCase().includes(kw))
      );
    }

    function renderCards(container, records, emptyMsg) {
      if (!records.length) {
        container.innerHTML = `<div class="empty">${emptyMsg}</div>`;
        return;
      }
      container.innerHTML = records.map(r => `
        <div class="food-card">
          <button class="edit-card-btn" data-edit="${r.id}" title="编辑">✏️</button>
          <button class="delete-btn" data-id="${r.id}" title="删除">×</button>
          <div class="name">${esc(r.foodName)}</div>
          <div class="reaction">${esc(r.reaction)}</div>
          ${r.note ? `<div class="note-text">${esc(r.note)}</div>` : ''}
          <div class="date">${esc(r.date)}</div>
        </div>
      `).join('');
    }

    function renderTable(records) {
      const tbody = $('recordTableBody');
      if (!records.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#a0907f;padding:20px;">没有符合条件的记录</td></tr>`;
        return;
      }
      tbody.innerHTML = records.map(r => `
        <tr>
          <td>${esc(r.foodName)}</td>
          <td><span class="tag ${catClass(r.category)}">${esc(r.category)}</span></td>
          <td>${esc(r.reaction)}</td>
          <td>${esc(r.note||'—')}</td>
          <td>${esc(r.date)}</td>
          <td><button class="btn-table-edit" data-edit="${r.id}">编辑</button><button class="btn-table-del" data-id="${r.id}">删除</button></td>
        </tr>
      `).join('');
    }

    function render() {
      const all = sorted(load());
      const kw = $('searchInput').value;
      const vis = filtered(all, kw);

      $('totalCount').textContent = all.length;
      $('filteredCount').textContent = vis.length;
      $('latestFood').textContent = all[0]?.foodName || '—';

      const safe    = vis.filter(r => r.category === '安全');
      const caution = vis.filter(r => r.category === '谨慎');
      const danger  = vis.filter(r => r.category === '危险');

      $('safeCount').textContent    = safe.length;
      $('cautionCount').textContent = caution.length;
      $('dangerCount').textContent  = danger.length;

      renderCards($('safeCards'),    safe,    '还没有安全食物记录，快来添加～');
      renderCards($('cautionCards'), caution, '还没有谨慎食物记录');
      renderCards($('dangerCards'),  danger,  '还没有危险食物记录（好事！）');
      renderTable(vis);
    }

    function delRecord(id) {
      const records = load();
      const target = records.find(r => r.id === id);
      if (!target) return;
      if (!confirm(`要删除「${target.foodName}」这条记录吗？`)) return;
      save(records.filter(r => r.id !== id));
      render();
    }

    // Modal
    const modal = $('recordModal');
    const form  = $('recordForm');

    // Modal open
    $('openModalBtn').addEventListener('click', () => {
      $('date').value = today();
      modal.classList.add('show');
      setTimeout(() => $('foodName').focus(), 50);
    });

    $('searchInput').addEventListener('input', render);

    // ── EDIT ──
    let editingId = null;

    function openEdit(id) {
      const records = load();
      const r = records.find(x => x.id === id);
      if (!r) return;
      editingId = id;
      $('foodName').value  = r.foodName;
      $('category').value  = r.category;
      $('reaction').value  = r.reaction;
      $('note').value      = r.note || '';
      $('date').value      = r.date;
      document.querySelector('.modal-title').textContent = '✏️ 编辑记录';
      modal.classList.add('show');
    }

    document.addEventListener('click', e => {
      const editBtn = e.target.closest('[data-edit]');
      if (editBtn) { openEdit(editBtn.dataset.edit); return; }
      const delBtn = e.target.closest('[data-id]');
      if (delBtn) delRecord(delBtn.dataset.id);
    });

    // Reset edit state when modal closes
    function closeModal() {
      modal.classList.remove('show');
      form.reset();
      editingId = null;
      document.querySelector('.modal-title').textContent = '🍽️ 新增肠胃记录';
    }

    $('cancelBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('show')) closeModal(); });

    form.addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(form);
      const data = {
        foodName: String(fd.get('foodName')||'').trim(),
        category: String(fd.get('category')||'').trim(),
        reaction: String(fd.get('reaction')||'').trim(),
        note:     String(fd.get('note')||'').trim(),
        date:     String(fd.get('date')||'').trim(),
      };
      if (!data.foodName || !data.category || !data.reaction || !data.date) {
        alert('请把必填项填完整哦～'); return;
      }
      const records = load();
      if (editingId) {
        const idx = records.findIndex(r => r.id === editingId);
        if (idx !== -1) records[idx] = { ...records[idx], ...data };
      } else {
        records.push({ id: uid(), ...data, createdAt: Date.now() });
      }
      save(records);
      closeModal();
      render();
    });

    // ── EXPORT ──
    $('exportBtn').addEventListener('click', () => {
      const records = load();
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `咪咪酱肠胃地图_备份_${today()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // ── IMPORT ──
    $('importBtn').addEventListener('click', () => $('importFile').click());

    $('importFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) { alert('文件格式不对哦～'); return; }
          if (!confirm(`导入 ${data.length} 条记录？这会覆盖现有所有数据。`)) return;
          save(data);
          render();
          alert('导入成功！');
        } catch {
          alert('读取文件失败，请确认是正确的JSON备份文件～');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    render();
  </script>
</body>
</html>
